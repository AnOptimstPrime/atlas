<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kitchen — Marko</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f7f5ee; --surface: #ffffff; --surface2: #f0ede1; --surface3: #e8e3d3;
    --border: #ddd6c3; --accent: #6b8f5f; --accent2: #8fae7e; --accent-deep: #4a6b3e;
    --green: #5a9c5a; --amber: #d99a3d; --red: #c75c4a;
    --text: #2c2a1f; --text2: #6b6856; --text3: #9a9682;
    --mama: #c97b8e;
  }
  body {
    font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh;
    background:
      radial-gradient(ellipse 600px 400px at 10% -5%, rgba(244,228,184,0.5), transparent),
      radial-gradient(ellipse 500px 350px at 95% 10%, rgba(143,174,126,0.18), transparent),
      linear-gradient(180deg, #faf8f0 0%, #f7f5ee 100%);
    position: relative;
  }
  .serif { font-family: 'Playfair Display', serif; }

  .vine-deco { position: fixed; top: 0; pointer-events: none; z-index: 0; opacity: 0.85; }
  .vine-left { left: 18px; }
  .vine-right { right: 18px; }

  .page-wrap { position: relative; z-index: 1; }

  .header { padding: 26px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-left h1 { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 6px; }
  .title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; color: var(--text); }
  .greeting { font-size: 12px; color: var(--text2); margin-top: 6px; }

  .chef-card {
    margin: 18px 28px 0; padding: 16px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; display: flex; gap: 14px; align-items: center;
    box-shadow: 0 2px 14px rgba(74,107,62,0.06);
  }
  .chef-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .chef-msg { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .chef-msg b { color: var(--accent-deep); font-weight: 600; }

  .view-bar { display: flex; gap: 8px; padding: 20px 28px 0; flex-wrap: wrap; }
  .view-btn {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view-btn.mama-active { background: var(--mama); border-color: var(--mama); color: #fff; }
  .view-btn:hover:not(.active):not(.mama-active) { border-color: var(--accent); color: var(--accent-deep); }

  .content { padding: 18px 28px 50px; max-height: calc(100vh - 280px); overflow-y: auto; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .section { margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-deep); white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

  .insp-card {
    padding: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    box-shadow: 0 2px 14px rgba(74,107,62,0.06);
  }
  .insp-title { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 600; margin-bottom: 8px; color: var(--accent-deep); }
  .insp-why { font-size: 12.5px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; }
  .insp-ingredients { display: flex; flex-wrap: wrap; gap: 7px; }
  .insp-chip { padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 11.5px; color: var(--accent-deep); font-weight: 500; }

  .stats-row { display: flex; gap: 24px; }
  .stat-block .sv { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--accent-deep); }
  .stat-block .sl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

  .kitchen-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border); margin-bottom: 7px;
    transition: box-shadow 0.15s;
  }
  .kitchen-item:hover { box-shadow: 0 2px 10px rgba(74,107,62,0.08); }
  .flag-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .flag-green { background: var(--green); box-shadow: 0 0 0 3px rgba(90,156,90,0.15); }
  .flag-yellow { background: var(--amber); box-shadow: 0 0 0 3px rgba(217,154,61,0.15); }
  .flag-red { background: var(--red); box-shadow: 0 0 0 3px rgba(199,92,74,0.15); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13.5px; color: var(--text); font-weight: 500; }
  .item-meta { font-size: 10.5px; color: var(--text3); margin-top: 2px; }
  .item-loc { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 10px; background: var(--surface2); color: var(--accent-deep); flex-shrink: 0; }
  .item-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 2px 4px; }
  .item-del:hover { color: var(--red); }

  .add-form {
    display: flex; flex-direction: column; gap: 9px; padding: 16px; background: var(--surface2);
    border: 1.5px dashed var(--border); border-radius: 14px;
  }
  .add-row { display: flex; gap: 8px; }
  .add-input, .add-select, textarea.add-input {
    flex: 1; padding: 10px 13px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 12.5px; outline: none;
  }
  .add-input:focus, .add-select:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--text3); }
  .add-btn-full {
    padding: 11px; background: var(--accent); border: none; border-radius: 10px; color: #fff;
    font-size: 12.5px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .add-btn-full:hover { opacity: 0.85; }
  .add-btn-full.mama { background: var(--mama); }

  .recipe-card {
    padding: 19px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    margin-bottom: 11px; cursor: pointer; transition: box-shadow 0.15s;
    box-shadow: 0 2px 10px rgba(74,107,62,0.05);
  }
  .recipe-card:hover { box-shadow: 0 4px 16px rgba(74,107,62,0.1); }
  .recipe-card.mama-card { border-color: rgba(201,123,142,0.3); background: linear-gradient(135deg, #fff, rgba(201,123,142,0.04)); }
  .recipe-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .recipe-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--text); }
  .recipe-source { font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 10px; flex-shrink: 0; }
  .source-enzo { background: rgba(107,143,95,0.15); color: var(--accent-deep); }
  .source-mine { background: rgba(150,140,210,0.15); color: #6f63b8; }
  .source-mama { background: rgba(201,123,142,0.18); color: var(--mama); }
  .recipe-desc { font-size: 12.5px; color: var(--text2); margin-top: 7px; line-height: 1.5; }
  .recipe-meta-row { display: flex; gap: 12px; margin-top: 11px; font-size: 11px; color: var(--text3); }
  .recipe-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .recipe-card.expanded .recipe-detail { display: block; }
  .detail-section { margin-bottom: 15px; }
  .detail-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 9px; }
  .ingredient-list { list-style: none; }
  .ingredient-list li { font-size: 12.5px; color: var(--text); padding: 5px 0; border-bottom: 1px solid var(--surface2); }
  .step-list { list-style: none; counter-reset: step; }
  .step-list li { font-size: 12.5px; color: var(--text); padding: 9px 0 9px 30px; position: relative; line-height: 1.55; counter-increment: step; }
  .step-list li::before {
    content: counter(step); position: absolute; left: 0; top: 9px; width: 19px; height: 19px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  }
  .mama-card .step-list li::before { background: var(--mama); }
  .mama-note {
    padding: 13px; background: rgba(201,123,142,0.08); border: 1px solid rgba(201,123,142,0.25);
    border-radius: 12px; font-size: 12.5px; color: var(--text2); line-height: 1.65; font-style: italic; margin-top: 9px;
  }
  .mama-note b { color: var(--mama); font-style: normal; }
  .del-recipe { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 11.5px; margin-top: 11px; }
  .del-recipe:hover { color: var(--red); }

  .tools-grid { display: flex; flex-wrap: wrap; gap: 9px; }
  .tool-pill {
    padding: 7px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    font-size: 12.5px; color: var(--text); display: flex; align-items: center; gap: 7px;
  }
  .tool-pill button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0; }
  .tool-pill button:hover { color: var(--red); }

  .empty { text-align: center; padding: 34px; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="header">
    <div class="header-left">
      <h1>The Kitchen</h1>
      <div class="title">Buongiorno, Marko</div>
      <div class="greeting" id="greetingDisplay"></div>
    </div>
  </div>

  <div class="chef-card">
    <div class="chef-avatar">👨‍🍳</div>
    <div class="chef-msg"><b>Enzo:</b> Ready to cook something good today? Tell me what's in the kitchen and I'll find you something delicious.</div>
  </div>

  <div class="view-bar" id="viewBar">
    <button class="view-btn active" data-view="today">Today</button>
    <button class="view-btn" data-view="kitchen">My Kitchen</button>
    <button class="view-btn" data-view="recipes">Recipe Book</button>
    <button class="view-btn" data-view="mama">Mama's Kitchen</button>
    <button class="view-btn" data-view="tools">My Tools</button>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<script>
const today = new Date();
const hour = today.getHours();

let kitchenItems = JSON.parse(localStorage.getItem('tk_kitchen') || 'null') || [
  { id: 'k1', name: 'Garlic', loc: 'pantry', expiry: '', flag: 'green' },
  { id: 'k2', name: 'Yukon gold potatoes', loc: 'pantry', expiry: '', flag: 'green' },
  { id: 'k3', name: 'Olive oil', loc: 'pantry', expiry: '', flag: 'green' },
];
let recipes = JSON.parse(localStorage.getItem('tk_recipes') || 'null') || [
  {
    id: 'r1', title: 'Aglio e Olio', source: 'enzo',
    desc: 'The simplest, most honest pasta there is — garlic, good olive oil, chili flake, parsley. Five ingredients, perfect technique.',
    time: '15 min', serves: '2',
    ingredients: ['200g spaghetti', '6 cloves garlic, thinly sliced', '5 tbsp extra virgin olive oil', '1/2 tsp chili flakes (light, your spice level)', 'Handful fresh parsley, chopped', 'Salt, pasta water'],
    steps: [
      'Bring a large pot of well-salted water to boil. Cook spaghetti until just shy of al dente.',
      'While pasta cooks, gently warm olive oil in a wide pan over low-medium heat. Add sliced garlic.',
      'Cook garlic slowly until golden, not brown — about 4-5 minutes. Burnt garlic turns bitter, so patience here.',
      'Add chili flakes to the warm oil for the last 30 seconds to bloom the flavor.',
      'Reserve 1 cup pasta water, then drain pasta and add directly to the pan.',
      'Toss vigorously, adding splashes of pasta water until the oil emulsifies into a light sauce that coats every strand.',
      'Finish with parsley, a touch more olive oil, and serve immediately while it sings.'
    ],
    expanded: false
  }
];
let mamaRecipes = JSON.parse(localStorage.getItem('tk_mama') || '[]');
let tools = JSON.parse(localStorage.getItem('tk_tools') || 'null') || ['Non-stick pan', 'Stainless steel pan', 'Oven', 'Sheet pan', 'Chef knife', 'Cutting board'];
let currentView = 'today';

function saveKitchen() { localStorage.setItem('tk_kitchen', JSON.stringify(kitchenItems)); }
function saveRecipes() { localStorage.setItem('tk_recipes', JSON.stringify(recipes)); }
function saveMama() { localStorage.setItem('tk_mama', JSON.stringify(mamaRecipes)); }
function saveTools() { localStorage.setItem('tk_tools', JSON.stringify(tools)); }

function todayHTML() {
  const urgent = kitchenItems.filter(i => i.flag === 'red' || i.flag === 'yellow');
  let html = '<div class="section"><div class="section-header"><span class="section-label">Today\'s Inspiration</span><div class="section-line"></div></div>';
  if (urgent.length > 0) {
    html += `<div class="insp-card">
      <div class="insp-title">Use these before they go</div>
      <div class="insp-why">A few things in your kitchen need attention soon — ask Enzo in conversation for a recipe built around them, or check My Kitchen to manage what's flagged.</div>
      <div class="insp-ingredients">${urgent.map(i => `<span class="insp-chip">${i.name}</span>`).join('')}</div>
    </div>`;
  } else {
    html += `<div class="insp-card">
      <div class="insp-title">Your kitchen looks fresh</div>
      <div class="insp-why">Nothing urgent right now. Add items to My Kitchen so Enzo can start building suggestions around what you actually have.</div>
    </div>`;
  }
  html += '</div>';
  html += `<div class="section"><div class="section-header"><span class="section-label">Quick Stats</span><div class="section-line"></div></div>
    <div class="insp-card">
      <div class="stats-row">
        <div class="stat-block">
          <div class="sv">${kitchenItems.length}</div>
          <div class="sl">Items Tracked</div>
        </div>
        <div class="stat-block">
          <div class="sv">${recipes.length}</div>
          <div class="sl">Recipes Saved</div>
        </div>
        <div class="stat-block">
          <div class="sv">${mamaRecipes.length}</div>
          <div class="sl">Mama's Recipes</div>
        </div>
      </div>
    </div>`;
  html += '</div>';
  return html;
}

function kitchenHTML() {
  const sorted = [...kitchenItems].sort((a, b) => {
    const order = { red: 0, yellow: 1, green: 2 };
    return order[a.flag] - order[b.flag];
  });
  let html = `<div class="section"><div class="section-header"><span class="section-label">My Kitchen</span><div class="section-line"></div><span class="section-count">${kitchenItems.length} items</span></div>`;
  if (sorted.length === 0) html += `<div class="empty">Nothing tracked yet — add what's in your fridge and pantry below.</div>`;
  sorted.forEach(item => {
    html += `<div class="kitchen-item">
      <div class="flag-dot flag-${item.flag}"></div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.expiry ? 'Expires ' + item.expiry : 'No expiry set'}</div>
      </div>
      <span class="item-loc">${item.loc}</span>
      <button class="item-del" data-del-kitchen="${item.id}">×</button>
    </div>`;
  });
  html += `<div class="add-form" style="margin-top:12px;">
    <div class="add-row">
      <input class="add-input" id="kName" placeholder="Item name">
      <select class="add-select" id="kLoc" style="flex:0 0 100px;">
        <option value="fridge">Fridge</option>
        <option value="pantry">Pantry</option>
        <option value="counter">Counter</option>
      </select>
    </div>
    <div class="add-row">
      <input class="add-input" id="kExpiry" placeholder="Expiry date (optional, e.g. July 5)">
      <select class="add-select" id="kFlag" style="flex:0 0 110px;">
        <option value="green">🟢 Fresh</option>
        <option value="yellow">🟡 Use Soon</option>
        <option value="red">🔴 Use Now</option>
      </select>
    </div>
    <button class="add-btn-full" id="addKitchenBtn">+ Add to Kitchen</button>
  </div>`;
  return html;
}

function recipesHTML() {
  let html = `<div class="section"><div class="section-header"><span class="section-label">Recipe Book</span><div class="section-line"></div><span class="section-count">${recipes.length}</span></div>`;
  if (recipes.length === 0) html += `<div class="empty">No recipes saved yet — ask Enzo for ideas, or add your own.</div>`;
  recipes.forEach(r => html += recipeCardHTML(r, false));
  html += `<div class="add-form" style="margin-top:14px;">
    <input class="add-input" id="rTitle" placeholder="Recipe title" style="width:100%;">
    <textarea class="add-input" id="rDesc" placeholder="Short description" style="width:100%; min-height:50px; resize:vertical;"></textarea>
    <div class="add-row">
      <input class="add-input" id="rTime" placeholder="Time (e.g. 30 min)">
      <input class="add-input" id="rServes" placeholder="Serves (e.g. 2)">
    </div>
    <textarea class="add-input" id="rIngredients" placeholder="Ingredients (one per line)" style="width:100%; min-height:70px; resize:vertical;"></textarea>
    <textarea class="add-input" id="rSteps" placeholder="Steps (one per line)" style="width:100%; min-height:90px; resize:vertical;"></textarea>
    <button class="add-btn-full" id="addRecipeBtn">+ Save Recipe</button>
  </div>`;
  html += '</div>';
  return html;
}

function mamaHTML() {
  let html = `<div class="section"><div class="section-header"><span class="section-label" style="color:var(--mama)">Mama's Kitchen</span><div class="section-line"></div><span class="section-count">${mamaRecipes.length}</span></div>`;
  html += `<div class="insp-card" style="border-color:rgba(201,123,142,0.25); margin-bottom:14px;"><div class="insp-why" style="color:var(--text2);">A space just for her recipes — written in her words, exactly as she'd tell you. ❤️</div></div>`;
  if (mamaRecipes.length === 0) html += `<div class="empty">No recipes added yet — start preserving her recipes here.</div>`;
  mamaRecipes.forEach(r => html += recipeCardHTML(r, true));
  html += `<div class="add-form" style="margin-top:14px; border-color:rgba(201,123,142,0.3);">
    <input class="add-input" id="mTitle" placeholder="Recipe title" style="width:100%;">
    <textarea class="add-input" id="mDesc" placeholder="Short description" style="width:100%; min-height:50px; resize:vertical;"></textarea>
    <div class="add-row">
      <input class="add-input" id="mTime" placeholder="Time (e.g. 1 hr)">
      <input class="add-input" id="mServes" placeholder="Serves (e.g. 4)">
    </div>
    <textarea class="add-input" id="mIngredients" placeholder="Ingredients (one per line)" style="width:100%; min-height:70px; resize:vertical;"></textarea>
    <textarea class="add-input" id="mSteps" placeholder="Steps (one per line)" style="width:100%; min-height:90px; resize:vertical;"></textarea>
    <textarea class="add-input" id="mNote" placeholder="Mama's notes — her exact words, quirks, the funny stuff" style="width:100%; min-height:60px; resize:vertical;"></textarea>
    <button class="add-btn-full mama" id="addMamaBtn">+ Add to Mama's Kitchen</button>
  </div>`;
  html += '</div>';
  return html;
}

function toolsHTML() {
  let html = `<div class="section"><div class="section-header"><span class="section-label">My Tools</span><div class="section-line"></div><span class="section-count">${tools.length}</span></div>`;
  html += `<div class="tools-grid">`;
  tools.forEach((t, i) => {
    html += `<span class="tool-pill">${t}<button data-del-tool="${i}">×</button></span>`;
  });
  html += `</div>`;
  html += `<div class="add-form" style="margin-top:14px;">
    <div class="add-row">
      <input class="add-input" id="toolName" placeholder="Add a tool (e.g. Air fryer, Dutch oven)">
      <button class="add-btn-full" style="flex:0 0 auto; padding:10px 20px;" id="addToolBtn">+ Add</button>
    </div>
  </div>`;
  html += '</div>';
  return html;
}

function recipeCardHTML(r, isMama) {
  const sourceClass = r.source === 'mine' ? 'source-mine' : (r.source === 'mama' ? 'source-mama' : 'source-enzo');
  const sourceLabel = r.source === 'mine' ? 'My Recipe' : (r.source === 'mama' ? "Mama's" : 'Enzo');
  return `<div class="recipe-card ${isMama ? 'mama-card' : ''} ${r.expanded ? 'expanded' : ''}" data-recipe-id="${r.id}" data-is-mama="${isMama}">
    <div class="recipe-top">
      <div class="recipe-title">${r.title}</div>
      <span class="recipe-source ${sourceClass}">${sourceLabel}</span>
    </div>
    <div class="recipe-desc">${r.desc}</div>
    <div class="recipe-meta-row">
      <span>⏱️ ${r.time}</span>
      <span>🍽️ Serves ${r.serves}</span>
    </div>
    <div class="recipe-detail">
      <div class="detail-section">
        <div class="detail-label">Ingredients</div>
        <ul class="ingredient-list">${(r.ingredients||[]).map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="detail-section">
        <div class="detail-label">Steps</div>
        <ol class="step-list">${(r.steps||[]).map(s => `<li>${s}</li>`).join('')}</ol>
      </div>
      ${r.mamaNote ? `<div class="mama-note"><b>In Mama's words:</b><br>${r.mamaNote}</div>` : ''}
      <button class="del-recipe" data-del-recipe="${r.id}" data-del-mama="${isMama}">Remove recipe</button>
    </div>
  </div>`;
}

function addKitchenItem() {
  const name = document.getElementById('kName').value.trim();
  if (!name) return;
  kitchenItems.push({
    id: 'k_' + Date.now(),
    name: name,
    loc: document.getElementById('kLoc').value,
    expiry: document.getElementById('kExpiry').value.trim(),
    flag: document.getElementById('kFlag').value
  });
  saveKitchen();
  render();
}

function deleteKitchenItem(id) {
  kitchenItems = kitchenItems.filter(i => i.id !== id);
  saveKitchen();
  render();
}

function toggleRecipe(id, isMama) {
  const list = isMama ? mamaRecipes : recipes;
  const r = list.find(x => x.id === id);
  if (r) r.expanded = !r.expanded;
  isMama ? saveMama() : saveRecipes();
  render();
}

function deleteRecipe(id, isMama) {
  if (isMama) { mamaRecipes = mamaRecipes.filter(r => r.id !== id); saveMama(); }
  else { recipes = recipes.filter(r => r.id !== id); saveRecipes(); }
  render();
}

function addRecipe() {
  const title = document.getElementById('rTitle').value.trim();
  if (!title) return;
  recipes.push({
    id: 'r_' + Date.now(),
    title: title,
    source: 'mine',
    desc: document.getElementById('rDesc').value.trim(),
    time: document.getElementById('rTime').value.trim() || '—',
    serves: document.getElementById('rServes').value.trim() || '—',
    ingredients: document.getElementById('rIngredients').value.split('\n').filter(x => x.trim()),
    steps: document.getElementById('rSteps').value.split('\n').filter(x => x.trim()),
    expanded: false
  });
  saveRecipes();
  render();
}

function addMamaRecipe() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) return;
  mamaRecipes.push({
    id: 'm_' + Date.now(),
    title: title,
    source: 'mama',
    desc: document.getElementById('mDesc').value.trim(),
    time: document.getElementById('mTime').value.trim() || '—',
    serves: document.getElementById('mServes').value.trim() || '—',
    ingredients: document.getElementById('mIngredients').value.split('\n').filter(x => x.trim()),
    steps: document.getElementById('mSteps').value.split('\n').filter(x => x.trim()),
    mamaNote: document.getElementById('mNote').value.trim(),
    expanded: false
  });
  saveMama();
  render();
}

function addTool() {
  const v = document.getElementById('toolName').value.trim();
  if (!v) return;
  tools.push(v);
  saveTools();
  render();
}

function deleteTool(i) {
  tools.splice(i, 1);
  saveTools();
  render();
}

function attachListeners() {
  // View bar buttons
  document.getElementById('viewBar').addEventListener('click', function(e) {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    currentView = btn.getAttribute('data-view');
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active', 'mama-active'));
    if (currentView === 'mama') btn.classList.add('mama-active');
    else btn.classList.add('active');
    render();
  });

  // Kitchen item delete buttons
  document.querySelectorAll('[data-del-kitchen]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteKitchenItem(btn.getAttribute('data-del-kitchen'));
    });
  });

  // Recipe cards and delete buttons
  document.querySelectorAll('[data-recipe-id]').forEach(card => {
    card.addEventListener('click', function() {
      const id = this.getAttribute('data-recipe-id');
      const isMama = this.getAttribute('data-is-mama') === 'true';
      toggleRecipe(id, isMama);
    });
  });

  document.querySelectorAll('[data-del-recipe]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const isMama = btn.getAttribute('data-del-mama') === 'true';
      deleteRecipe(btn.getAttribute('data-del-recipe'), isMama);
    });
  });

  // Tool delete buttons
  document.querySelectorAll('[data-del-tool]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteTool(parseInt(btn.getAttribute('data-del-tool'), 10));
    });
  });

  // Add buttons
  const addKitchenBtn = document.getElementById('addKitchenBtn');
  if (addKitchenBtn) addKitchenBtn.addEventListener('click', addKitchenItem);

  const addRecipeBtn = document.getElementById('addRecipeBtn');
  if (addRecipeBtn) addRecipeBtn.addEventListener('click', addRecipe);

  const addMamaBtn = document.getElementById('addMamaBtn');
  if (addMamaBtn) addMamaBtn.addEventListener('click', addMamaRecipe);

  const addToolBtn = document.getElementById('addToolBtn');
  if (addToolBtn) addToolBtn.addEventListener('click', addTool);

  // Enter key on tool input
  const toolName = document.getElementById('toolName');
  if (toolName) {
    toolName.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTool();
    });
  }
}

function render() {
  let html = '';
  if (currentView === 'today') html = todayHTML();
  else if (currentView === 'kitchen') html = kitchenHTML();
  else if (currentView === 'recipes') html = recipesHTML();
  else if (currentView === 'mama') html = mamaHTML();
  else html = toolsHTML();
  document.getElementById('mainContent').innerHTML = html;
  attachListeners();
}

document.getElementById('greetingDisplay').textContent = (hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening') + ' — what are we cooking today?';

render();
</script>
</body>
</html>
